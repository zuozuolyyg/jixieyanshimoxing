<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江海大-曲柄连杆仿真模型</title>

    <!-- 预加载 Three.js，减少网络等待 -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" as="script">

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #f0f2f5; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            /* 预设背景色与场景一致，防止黑屏闪烁 */
            background-color: #f5f7fa;
        }
        #canvas-container canvas {
            display: block;
        }

        /* 加载遮罩 */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.4s ease;
        }
        #loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 44px; height: 44px;
            border: 4px solid #e0e0e0;
            border-top-color: #74b9ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 12px; color: #999; font-weight: 600; letter-spacing: 0.1em; }

        /* 控制面板 */
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.92);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.5);
            min-width: 220px;
            z-index: 10;
        }
        .main-title {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #2c3e50;
            font-weight: 700;
            border-left: 4px solid #74b9ff;
            padding-left: 10px;
        }
        .sub-title {
            margin: 0 0 20px 0;
            font-size: 12px;
            color: #7f8c8d;
            padding-left: 14px;
        }
        .control-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 13px;
            font-weight: 600;
        }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #74b9ff; }
        .value-display {
            font-size: 12px;
            color: #3498db;
            float: right;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <!-- 加载遮罩 -->
    <div id="loading-overlay">
        <div class="loader-ring"></div>
        <div class="loader-text">正在初始化仿真引擎...</div>
    </div>

    <!-- 控制面板 -->
    <div id="controls">
        <h1 class="main-title">江海大</h1>
        <p class="sub-title">曲柄连杆仿真模型</p>
        <div class="control-group">
            <label>转速 (RPM) <span id="speed-val" class="value-display">60</span></label>
            <input type="range" id="speed-slider" min="0" max="300" value="60">
        </div>
        <div class="control-group">
            <label>连杆长度 (L) <span id="rod-val" class="value-display">12</span></label>
            <input type="range" id="rod-length-slider" min="8" max="16" step="0.1" value="12">
        </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js 放在 body 末尾，不阻塞 HTML 解析与首屏渲染 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let crank, rod, piston, ghostCylinder, crankPin;

        let params = {
            crankRadius: 4,
            rodLength: 12,
            pistonRadius: 3.5,
            speed: 60,
            angle: 0
        };

        const materials = {
            crank:    new THREE.MeshStandardMaterial({ color: 0xaec6cf, metalness: 0.3, roughness: 0.4 }),
            rod:      new THREE.MeshStandardMaterial({ color: 0xffb3ba, metalness: 0.3, roughness: 0.4 }),
            piston:   new THREE.MeshStandardMaterial({ color: 0xfdfd96, metalness: 0.6, roughness: 0.2 }),
            pin:      new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.8, roughness: 0.2 }),
            cylinder: new THREE.MeshPhysicalMaterial({
                color: 0xffffff, metalness: 0.1, roughness: 0.1,
                transmission: 0.6, opacity: 0.4, transparent: true, side: THREE.DoubleSide
            })
        };

        function init() {
            const container = document.getElementById('canvas-container');
            const loadingOverlay = document.getElementById('loading-overlay');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f7fa);
            scene.fog = new THREE.Fog(0xf5f7fa, 20, 100);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(20, 15, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            // 限制最大像素比为2，防止高分屏性能下降
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Three.js 就绪，淡出加载遮罩
            loadingOverlay.classList.add('fade-out');
            setTimeout(() => { loadingOverlay.style.display = 'none'; }, 450);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            createModel();

            const gridHelper = new THREE.GridHelper(50, 50, 0xccd1d1, 0xe5e8e8);
            gridHelper.position.y = -6;
            scene.add(gridHelper);

            setupUI();
            animate();

            // ResizeObserver 精准响应容器尺寸变化
            const ro = new ResizeObserver(() => {
                const w = container.clientWidth;
                const h = container.clientHeight;
                if (w > 0 && h > 0) {
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                }
            });
            ro.observe(container);
        }

        function createModel() {
            const group = new THREE.Group();
            scene.add(group);

            // 曲柄
            const crankGeo = new THREE.BoxGeometry(params.crankRadius + 1, 1, 1);
            crankGeo.translate(params.crankRadius / 2, 0, 0);
            crank = new THREE.Mesh(crankGeo, materials.crank);
            crank.castShadow = true;

            const pivotGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 32);
            const pivot = new THREE.Mesh(pivotGeo, materials.pin);
            pivot.rotation.x = Math.PI / 2;
            group.add(pivot);
            group.add(crank);

            // 曲柄销
            const pinGeo = new THREE.CylinderGeometry(0.6, 0.6, 2.2, 32);
            crankPin = new THREE.Mesh(pinGeo, materials.pin);
            crankPin.rotation.x = Math.PI / 2;
            crank.add(crankPin);
            crankPin.position.set(params.crankRadius, 0, 0);

            // 连杆
            const rodGeo = new THREE.BoxGeometry(params.rodLength, 0.8, 0.8);
            rodGeo.translate(params.rodLength / 2, 0, 0);
            rod = new THREE.Mesh(rodGeo, materials.rod);
            rod.castShadow = true;
            group.add(rod);

            // 活塞
            const pistonGeo = new THREE.CylinderGeometry(params.pistonRadius, params.pistonRadius, 4, 32);
            piston = new THREE.Mesh(pistonGeo, materials.piston);
            piston.rotation.z = Math.PI / 2;
            piston.castShadow = true;
            group.add(piston);

            // 气缸（透明）
            const cylLen = (params.crankRadius + params.rodLength) * 2 + 5;
            const cylGeo = new THREE.CylinderGeometry(params.pistonRadius + 0.2, params.pistonRadius + 0.2, cylLen, 32, 1, true);
            ghostCylinder = new THREE.Mesh(cylGeo, materials.cylinder);
            ghostCylinder.rotation.z = Math.PI / 2;
            ghostCylinder.position.x = params.rodLength;
            group.add(ghostCylinder);
        }

        const FIXED_DELTA = 0.016;
        function updatePhysics() {
            const angularSpeed = (params.speed * 2 * Math.PI) / 60;
            params.angle -= angularSpeed * FIXED_DELTA;

            crank.rotation.z = params.angle;

            const crankPinX = Math.cos(params.angle) * params.crankRadius;
            const crankPinY = Math.sin(params.angle) * params.crankRadius;

            let term = Math.pow(params.rodLength, 2) - Math.pow(crankPinY, 2);
            if (term < 0) term = 0;
            const pistonX = crankPinX + Math.sqrt(term);

            piston.position.set(pistonX, 0, 0);
            rod.position.set(crankPinX, crankPinY, 0.5);
            rod.rotation.z = Math.atan2(-crankPinY, pistonX - crankPinX);
        }

        function setupUI() {
            document.getElementById('speed-slider').addEventListener('input', (e) => {
                params.speed = parseFloat(e.target.value);
                document.getElementById('speed-val').innerText = params.speed;
            });

            document.getElementById('rod-length-slider').addEventListener('input', (e) => {
                const newL = parseFloat(e.target.value);
                if (newL <= params.crankRadius + 1) return;
                params.rodLength = newL;
                document.getElementById('rod-val').innerText = newL.toFixed(1);

                const parentGroup = rod.parent;
                parentGroup.remove(rod);
                rod.geometry.dispose();

                const rodGeo = new THREE.BoxGeometry(params.rodLength, 0.8, 0.8);
                rodGeo.translate(params.rodLength / 2, 0, 0);
                rod = new THREE.Mesh(rodGeo, materials.rod);
                rod.castShadow = true;
                parentGroup.add(rod);

                if (ghostCylinder) ghostCylinder.position.x = params.rodLength;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updatePhysics();
            renderer.render(scene, camera);
        }

        // ✅ Chrome/Edge 黑屏根本修复：
        // ResizeObserver 等容器真正有尺寸后才初始化，只触发一次
        const container = document.getElementById('canvas-container');
        let inited = false;
        const initObserver = new ResizeObserver((entries) => {
            for (const entry of entries) {
                const { width, height } = entry.contentRect;
                if (width > 0 && height > 0 && !inited) {
                    inited = true;
                    initObserver.disconnect();
                    init();
                }
            }
        });
        initObserver.observe(container);
    </script>
</body>
</html>
